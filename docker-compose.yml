services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: control-tower-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Bogota}
      TZ: ${GENERIC_TIMEZONE:-America/Bogota}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Define N8N_ENCRYPTION_KEY en .env}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
